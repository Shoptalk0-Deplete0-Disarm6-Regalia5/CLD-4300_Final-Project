name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node (optional, for npm-based assets)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install npm deps if present
        working-directory: site
        run: |
          if [ -f package.json ]; then
            npm ci
          fi

      - name: Setup Hugo (Extended)
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Hugo version
        run: hugo version

      - name: Build Hugo site (run inside site/)
        working-directory: site
        run: |
          hugo --minify --destination=public --logLevel=info --printUnusedTemplates 2>&1 | tee hugo-build.log
          echo "Build complete. Listing public/:"
          ls -la public || true

      - name: Verify artifact
        run: |
          echo "Listing site/public:"
          ls -la site/public || true
          echo "Find HTML files:"
          find site/public -type f -iname '*.html' -maxdepth 6 -print || true
          test -f site/public/index.html && echo "index.html present" || echo "index.html missing"

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_FLOWER_0BF71611E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./site/public"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_FLOWER_0BF71611E }}
          action: "close"
