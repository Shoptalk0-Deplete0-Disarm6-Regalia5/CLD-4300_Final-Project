name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node (for PostCSS if needed)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install npm deps if present
        working-directory: site
        run: |
          if [ -f package.json ]; then
            npm ci
          fi

      - name: Setup Hugo (Extended)
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Hugo version
        run: hugo version

      - name: Build Hugo site (run inside site/)
        working-directory: site
        run: |
          hugo --minify --destination=public --logLevel=info --printUnusedTemplates 2>&1 | tee hugo-build.log
          echo "Build complete. Listing public/:"
          ls -la public || true

      - name: Show Hugo build tail
        run: |
          echo "Build log tail:"
          tail -n 200 site/hugo-build.log || tail -n 200 hugo-build.log || true

      - name: Show artifact and checksums
        run: |
          echo "Listing site/public root:"
          ls -la site/public || true
          echo "Find any HTML files under site/public:"
          find site/public -type f -iname '*.html' -maxdepth 6 -print -exec stat --format='%n %s bytes %U:%G %A' {} \; || true
          echo "Find index files case-insensitive:"
          find site/public -type f -iname 'index.*' -maxdepth 6 -print -exec stat --format='%n %s bytes %U:%G %A' {} \; || true
          test -f site/public/index.html && md5sum site/public/index.html || true

      - name: Debug artifact root full
        run: |
          echo "PWD: $(pwd)"
          echo "Runner user: $(id -un) $(id -a)"
          echo "Recursive tree (maxdepth 4):"
          find site/public -maxdepth 4 -print -exec ls -ld {} \; || true
          echo "Show first 40 lines of site/public/index.html if present:"
          if [ -f site/public/index.html ]; then head -n 40 site/public/index.html; else echo "site/public/index.html not at root"; fi
          echo "Disk usage of artifact:"
          du -sh site/public || true

      - name: Get Id Token (for OIDC)
        id: idtoken
        uses: actions/github-script@v6
        with:
          script: |
            const core = require('@actions/core');
            return await core.getIDToken();
          result-encoding: string

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Keep the Azure deployment token from the original Azure-created workflow as a fallback
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_<GENERATED_HOSTNAME> }}
          # GitHub token for PR comments/status updates
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          # OIDC id token (action will use OIDC if configured on the Azure side)
          github_id_token: ${{ steps.idtoken.outputs.result }}
          action: "upload"
          # We built the site in the workflow and the artifact is at site/public
          app_location: "./site/public"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Get Id Token (for OIDC)
        id: idtoken-close
        uses: actions/github-script@v6
        with:
          script: |
            const core = require('@actions/core');
            return await core.getIDToken();
          result-encoding: string

      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_<GENERATED_HOSTNAME> }}
          github_id_token: ${{ steps.idtoken-close.outputs.result }}
          action: "close"
